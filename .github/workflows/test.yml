name: Test

# Thin caller for the canonical reusable electron-app CI workflow at
# arthur-debert/release. The `check` job replaces the previously
# hand-rolled setup-node + pnpm install + format:check + lint +
# typecheck sequence.
#
# The `e2e` job stays bespoke — it needs macOS (the only target this
# round supports for packaging), downloads the simple-gal sibling
# release binary, builds the renderer, and runs Playwright in
# electron-launch mode. None of that fits the reusable workflow's
# input surface cleanly.
#
# See docs/per-stack/electron-ci.md in arthur-debert/release for the
# full input reference. Sibling adopter: lex-fmt/lexed.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    uses: arthur-debert/release/.github/workflows/electron-ci.yml@v1
    with:
      node-version: '22'
      # No shared-build-dir (no monorepo subpackage), no submodules,
      # no pre-test (binary fetch is only needed for the e2e job),
      # no playwright (the bespoke e2e job below does the install).
      # Package manager (pnpm) is auto-detected from pnpm-lock.yaml.

  e2e:
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # No explicit `version:` — package.json's `packageManager` field
      # is the single source of truth (Corepack convention). Setting
      # `version:` here while package.json also pins triggers
      # ERR_PNPM_BAD_PM_VERSION. Same fix as the canonical
      # electron-ci.yml's `Setup pnpm` step.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        env:
          # Skip the postinstall binary download here — the dedicated
          # fetch step below handles it with explicit auth. Letting
          # postinstall run would either fail (no auth) or require
          # cargo, neither of which we want gating dependency install.
          SIMPLE_GAL_PATH: ''
        run: pnpm install --frozen-lockfile

      - name: Download simple-gal release binary
        run: node scripts/fetch-simple-gal.mjs

      - name: Point SIMPLE_GAL_PATH at the downloaded binary
        run: |
          echo "SIMPLE_GAL_PATH=$GITHUB_WORKSPACE/resources/bin/darwin-arm64/simple-gal" >> $GITHUB_ENV

      # Renderer + main only — e2e launches Electron from
      # dist-electron/main.js, not from a packaged build, so we skip
      # `pnpm run build`'s chained electron-builder step.
      - name: Build (vite only)
        run: pnpm exec vite build

      - name: Playwright (Electron smoke + full UI suite)
        run: pnpm run test:e2e

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots
          path: tests/__screenshots__/
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
