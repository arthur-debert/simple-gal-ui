name: Test

# Thin caller for the canonical reusable electron-app CI workflow at
# arthur-debert/release. The `check` job replaces the previously
# hand-rolled setup-node + pnpm install + format:check + lint +
# typecheck sequence.
#
# The `e2e` job is also canonical now (since release@v1 gained the
# `e2e: true` opt-in input in arthur-debert/release#185). The bespoke
# Mac-only e2e job that previously lived here is retired; macOS is
# selected via the `runner:` input, and the consumer-specific glue
# (vite build of the renderer + pointing SIMPLE_GAL_PATH at the
# fetched simple-gal binary) runs in the `pre-test` hook. The simple-gal
# sibling release binary is downloaded by the package.json `postinstall`
# hook (it's a public repo, so the default GITHUB_TOKEN is sufficient).
#
# See docs/per-stack/electron-ci.md in arthur-debert/release for the
# full input reference. Sibling adopter: lex-fmt/lexed.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    uses: arthur-debert/release/.github/workflows/electron-ci.yml@v1
    with:
      node-version: '22'
      # macOS is required for the e2e suite: tests launch Electron
      # against `dist-electron/main.js` and load the platform-matching
      # simple-gal native binary under `resources/bin/darwin-arm64/`.
      runner: macos-latest
      e2e: true
      # The e2e job needs the renderer built (tests load
      # dist-electron/main.js) and SIMPLE_GAL_PATH pointing at the
      # platform-matched binary fetched by postinstall.
      pre-test: |
        pnpm exec vite build
        echo "SIMPLE_GAL_PATH=$GITHUB_WORKSPACE/resources/bin/darwin-arm64/simple-gal" >> "$GITHUB_ENV"
      # No shared-build-dir (no monorepo subpackage), no submodules.
      # Package manager (pnpm) is auto-detected from pnpm-lock.yaml.
