# Release simple-gal-ui — thin caller into the canonical electron-app
# reusable workflow at
# `arthur-debert/release/.github/workflows/electron-app.yml`.
#
# Trigger model: **workflow_dispatch**. Fire via
#   gh workflow run release.yml -f version=<X.Y.Z>
# The reusable workflow's prepare-release-npm action bumps
# package.json, rolls CHANGELOG.md's `## [Unreleased]` section,
# commits, tags `v<X.Y.Z>`, pushes, then drives per-arch build →
# sign → notarize (macOS submit/poll/staple) → GitHub release.
#
# Migration history: replaces an in-tree per-platform matrix
# workflow that tag-triggered on `v*.*.*`. The bespoke version
# duplicated logic shared across electron-app consumers (lexed,
# simple-gal-ui); fixes now land once in release/ instead of N
# times across consumers.

name: Release simple-gal-ui

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (bare semver, e.g. 0.1.0 — no leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/electron-app.yml@v3
    with:
      version: ${{ inputs.version }}
      app-name: simple-gal-ui
      bundle-id: com.arthur-debert.simple-gal-ui
      darwin-archs: arm64
      linux-archs: x64
      windows-archs: x64
      changelog-path: CHANGELOG.md
      # electron-builder directories.output → "release" per
      # electron-builder.yml. The canonical workflow defaults to "dist".
      output-dir: release
      # Force-enable macOS notarization in CI. The repo has all five
      # required secrets configured (APPLE_CERTIFICATE_P12_BASE64,
      # APPLE_CERTIFICATE_PASSWORD, ASC_API_KEY_BASE64, ASC_API_KEY_ID,
      # ASC_API_ISSUER_ID); the canonical workflow fails fast if any
      # are missing. `build.mac.notarize` is `false` in
      # electron-builder.yml — the canonical handles notarize via
      # `xcrun notarytool` (submit/poll/staple) for queue visibility.
      notarize: 'true'
    secrets: inherit
