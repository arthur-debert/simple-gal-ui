name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install simple-gal from source
        run: cargo install --git https://github.com/arthur-debert/simple-gal.git simple-gal
        shell: bash
      - name: Export simple-gal path
        shell: bash
        run: echo "SIMPLE_GAL_PATH=$(which simple-gal || echo $HOME/.cargo/bin/simple-gal)" >> $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm run build
      - name: Run Playwright smoke test (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm run test:e2e
      - name: Run Playwright smoke test (macOS/Windows)
        if: runner.os != 'Linux'
        run: pnpm run test:e2e
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.os }}
          path: tests/__screenshots__/
          if-no-files-found: ignore
