# electron-builder configuration for simple-gal-ui
#
# First-round packaging target: macOS arm64 unsigned. Other platforms and
# code signing will land in a follow-up round.
#
# Usage:
#   pnpm run package         — produces a signed/notarized .dmg in release/
#   pnpm run package:dir     — produces an unpacked .app only (fast dev loop)

appId: com.arthur-debert.simple-gal-ui
productName: simple-gal-ui
copyright: Copyright © 2026 Arthur Debert

directories:
  output: release
  buildResources: resources

# File inclusion. Since vite.config.ts bundles every main-process runtime
# dependency (electron-store, chokidar, serve-handler, etc.) directly into
# dist-electron/main.js, the packaged app doesn't need anything from
# node_modules at runtime — `electron` is the only import we leave
# external and it's supplied by Electron's runtime, not by node_modules.
# So we ship ONLY the compiled bundles + package.json + the bundled
# simple-gal binary (via extraResources below).
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - '!**/*.map'

# The bundled simple-gal binary lives outside the asar so it can be executed
# directly. electron/binPath.ts resolves it via process.resourcesPath/bin/...
extraResources:
  - from: resources/bin
    to: bin
    filter: ['**/*']

mac:
  category: public.app-category.photography
  icon: resources/icon.png
  identity: null # unsigned for this round
  target:
    - target: dmg
      arch: [arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  writeUpdateInfo: false
  sign: false
