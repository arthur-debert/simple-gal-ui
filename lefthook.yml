output:
  - meta
  - skips
  - summary
pre-commit:
  parallel: true
  commands:
    markdownlint:
      glob: "**/*.md"
      run: markdownlint {staged_files}
      priority: 2
    yamllint:
      glob: "**/*.{yml,yaml}"
      run: yamllint {staged_files}
      priority: 2
    shellcheck:
      glob:
        - "**/*.{sh,bash}"
        - "scripts/**"
        - "bin/**"
      exclude:
        - "**/*.{md,json,yaml,yml,toml,py,rb,rs,js,ts,mjs,cjs,html,css,txt,lock}"
      run: shellcheck {staged_files}
      priority: 2
    eslint:
      glob:
        - "**/*.{js,jsx,ts,tsx,vue,mjs,cjs}"
        - "**/.eslintrc*"
        - "**/eslint.config.*"
      run: npx --no-install eslint --max-warnings 0 -- {staged_files}
      priority: 2
    prettier:
      glob:
        - "**/*.{js,jsx,ts,tsx,vue,svelte,json,html,css,scss,md,yml,yaml}"
      run: npx --no-install prettier --check -- {staged_files}
      priority: 2
    typecheck:
      glob:
        - "**/*.{ts,tsx}"
        - "**/tsconfig*.json"
      run: npm run --silent typecheck --if-present
      priority: 2
