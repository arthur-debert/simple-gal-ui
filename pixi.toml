# pixi workspace — seeded by `shipit install` (the managed blocks below
# need a valid manifest). Consumer-owned from here on: edit freely.
[workspace]
name = "arthur-debert_simple-gal-ui"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[tasks]
# >>> shipit-managed test task (do not edit; regenerate via `shipit install`) >>>
test = "./bin/shipit test"
# <<< shipit-managed test task <<<
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
# <<< shipit-managed tasks <<<

# Consumer-owned tasks (outside the shipit-managed blocks above).
# The wf-checks TEST LANE's run (ADP02-WS05, #75; modeled on lexed's
# test-full): the wf-checks block's checkout provisions nothing beyond pixi,
# so the lane task SELF-PROVISIONS everything the unit suite needs before
# dispatching to the managed `test` task's implementation (`./bin/shipit
# test` -> `npm test` -> `vitest run` over tests/unit/**, a pure-node suite):
#   - `pnpm install --frozen-lockfile` — the repo's node_modules, lockfile-
#     exact (node/pnpm ride pixi's managed node deps block below). The
#     package.json `postinstall` hook (fetch-simple-gal) is deliberately
#     non-fatal (`|| true` in the script itself): the sibling release binary
#     it fetches is the E2E/packaging surface, which stays on the companion
#     e2e.yml workflow — the unit suite never launches the app.
# This is a clean, lockfile-exact install — deliberately, so this run mirrors
# the CI test lane byte-for-byte. For fast local iteration run the `test`
# task (`./bin/shipit test`) directly against a tree you already installed.
test-full = "pnpm install --frozen-lockfile && ./bin/shipit test"

[feature.lint.dependencies]
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (https://github.com/arthur-debert/shipit/blob/main/docs/legacy-prd/adoption.md:
# the managed set owns the consumer environment).
# Canonical versions live HERE — a bump is one data edit, rolled fleet-wide on
# each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[feature.lint.tasks]
# The wf-checks LINT LANE's run (ADP02-WS05, #75), byte-modeled on lexed's /
# lex's / shipit's own: the lint toolchain (shellcheck/shfmt/prettier/
# markdownlint/yamllint/actionlint) lives in THIS feature's env, so the lane
# task must resolve into the lint env — the managed bare `lint` task is a
# fixed plain string that runs in the default env (where none of those tools
# exist on a hosted runner). Unlike lexed/lex there is no lexd provisioning
# (this repo tracks no .lex files, so the lex Lang of `shipit lint` never
# runs) and no submodule init (no submodules; shipit#759 n/a). Defined ONLY
# in this feature, so it exists in EXACTLY ONE env (lint) and bare
# `pixi run lint-full` resolves unambiguously — the wf-checks matrix job's
# `pixi run --locked lint-full` and a laptop run are identical.
lint-full = { cmd = "./bin/shipit lint" }

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint", "shipit-lexd"]
# <<< shipit-managed environments <<<

[dependencies]
# >>> shipit-managed node deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned node runtime (#547 Layer 1) — delivered because this repo
# tracks a package.json. Unlike the rust/go blocks this is NOT a linter
# toolchain: it provisions the repo's OWN node/pnpm runtime (npm rides the
# nodejs package), which is why it lives in the DEFAULT env's [dependencies]
# rather than the lint feature. If this repo no longer ships node (the last
# package.json is gone), delete this block and its `pixi.toml#shipit-node-deps`
# entry in .shipit.toml's [managed] table — a reconcile only ADDS toolchain
# blocks, it never retires one.
nodejs = "26.*"
pnpm = "11.*"
# <<< shipit-managed node deps <<<
# Consumer-owned dependencies (outside the shipit-managed block above).
# uv backs the pinned bin/shipit launcher (ADR-0033: it provisions the repo's
# pinned shipit via uv, PATH-independent). Both wf-checks lanes run
# `pixi run --locked <task>` -> ./bin/shipit on a hosted runner where uv is
# not otherwise present, so the launcher's one prerequisite must ride the env
# too. (Known upstream gap — the block/managed set should own this:
# shipit#758, first flagged by lex#828/#829.)
uv = ">=0.5"

# >>> shipit-managed lexd feature (do not edit; regenerate via `shipit install`) >>>
[feature.shipit-lexd]
# lexd — the lex Lang's lint-gate tool — resolved as an ordinary conda package
# from the public Artifact channel (ADR-0066: `provision lexd` retired). The
# channel is scoped to THIS reserved feature (a sibling of conda-forge, added to
# whatever env `shipit-lexd` is wired into — the lint env), so lexd rides
# pixi.lock and pixi's sha256 like every other linter, and `shipit install`
# keeps the whole fleet on ONE lexd version — uniformity moved from a compiled
# binary constant to this managed block (ADR-0047: not consumer config).
channels = ["https://storage.googleapis.com/shipit-artifacts-public/lex-fmt/lex"]

# The fleet-pinned lexd, PLATFORM-SCOPED via pixi `[target]` tables. This file is
# the block HEADER; `shipit install` GENERATES one
# `[feature.shipit-lexd.target.<plat>.dependencies]` table below per platform in
# (this repo's declared `[workspace].platforms` ∩ the channel's CLOSED SERVED SET
# — `SERVED_SUBDIRS`, `src/shipit/channel/buckets.py`:
# osx-arm64/linux-64/linux-aarch64 AND win-64), pinned to `LEXD_PIN`
# (`src/shipit/install/units.py`, the single pin edit) — NEVER a blanket
# `[feature.shipit-lexd.dependencies]`. See `units.lexd_block`; a bump is one edit
# to `LEXD_PIN`, rolled fleet-wide on each consumer's next reconcile.
#
# Why intersect with the repo's OWN declared platforms (#1072): a `[target]`
# selector for a platform the workspace does NOT declare makes pixi warn on EVERY
# invocation (`target selector 'win-64' does not match any of the platforms
# supported by the workspace`) — fleet-wide noise (hit on shipit's own `main`
# after #1068 emitted a fixed all-of-served target set). A repo emits a target
# only for a platform it actually declares.
#
# Why intersect with the served set (#1068) — load-bearing AND fail-closed:
#  - A BLANKET `[feature.shipit-lexd.dependencies]` applied lexd to EVERY platform
#    a composing env declares, so a consumer declaring a platform OUTSIDE the
#    served set (e.g. osx-64, Intel Mac) had no channel candidate and got an
#    unsatisfiable lint-env solve — `shipit install` then failed closed with no
#    commit and no reconcile (#1068). Platforms NOT in the served set carry NO
#    lexd dep, so their lint env SOLVES and install/reconcile no longer breaks.
#  - win-64 IS in the served set (served, merely owner-PAUSED under the Windows
#    build pause #895, ADR-0071). A repo that DECLARES win-64 keeps a win-64
#    target and FAILS CLOSED at solve (the channel serves no win-64 lexd while the
#    pause holds — ADR-0071's "Windows consumers fail closed, loudly"); a repo
#    that does NOT declare win-64 emits no win-64 target (and no dangling-selector
#    warning). It re-resolves automatically when #895 lifts — no edit here.
[feature.shipit-lexd.target.osx-arm64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-aarch64.dependencies]
lexd = "==0.19.10"
# <<< shipit-managed lexd feature <<<
